name: docs

# Docs-as-code: kura.toml + this workflow render docs/ into a searchable, agent-native static site
# via the kurajs/pages action. clikae.cver.net is a custom domain (served at the root), so we build
# with the action (deploy: false) and publish ourselves, carrying the gh-pages CNAME back in so the
# custom domain survives every redeploy.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "kura.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - id: kura
        uses: kurajs/pages@v1
        with:
          deploy: false # publish below so we can preserve the custom-domain CNAME

      - name: Preserve the custom-domain CNAME from gh-pages
        run: |
          git fetch origin gh-pages --depth 1 2>/dev/null || true
          git show origin/gh-pages:CNAME > "${{ steps.kura.outputs.dir }}/CNAME" 2>/dev/null && echo "kept CNAME: $(cat "${{ steps.kura.outputs.dir }}/CNAME")" || echo "no CNAME on gh-pages"

      - name: Publish to gh-pages (CNAME preserved)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ steps.kura.outputs.dir }}
          commit_message: "docs: publish Kura site (${{ github.sha }})"
