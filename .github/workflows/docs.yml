name: docs

# Docs-as-code: kura.toml + this workflow. The kurajs/pages action renders docs/ into a searchable,
# agent-native static site and deploys it to GitHub Pages. It auto-detects the deploy path (clikae's
# repo-level custom domain clikae.cver.net -> served at the root) and preserves the CNAME, so there's
# nothing to configure here.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "kura.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Pinned to a commit SHA, not the mutable `v1` tag — kurajs/pages is a very
      # young action (org + repo both created 2026, no track record yet), and its
      # own cli/docs deps default to a floating pre-1.0 range. Pinning all three
      # means clikae only picks up a new Kura release when someone here reviews
      # and bumps it, not automatically on the next docs build. Verified-working
      # versions as of 2026-07-05: @kurajs/cli@0.0.28, @kurajs/docs@0.0.53.
      - uses: kurajs/pages@3ca3b9f42e9f31057cb757bc210a789bd975a462 # v1
        with:
          cli-version: "0.0.28"
          docs-version: "0.0.53"
