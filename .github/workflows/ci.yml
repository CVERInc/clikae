name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          scandir: '.'
          additional_files: 'bin/clikae install.sh'

  smoke:
    name: smoke test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install
        run: ./install.sh
        env:
          PREFIX: ${{ github.workspace }}/.local
      - name: Sanity
        run: |
          export PATH="${{ github.workspace }}/.local/bin:$PATH"
          clikae version
          clikae help
          clikae adapters
          clikae list

  bats:
    name: bats (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: |
          git clone --depth 1 https://github.com/bats-core/bats-core.git "$RUNNER_TEMP/bats"
          "$RUNNER_TEMP/bats/install.sh" "$HOME/.local"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Run tests
        run: bats --print-output-on-failure tests/bats
